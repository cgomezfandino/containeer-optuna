models:
  - name: "ridge"
    type: "regression"
    default_params:
      alpha: 1.0
      tol: 0.001
      random_state: 42
      max_iter: 10000
    param_space:
      alpha:
        type: "float"
        low: 0.01
        high: 100.0
        log: true
      tol:
        type: "float"
        low: 1e-6
        high: 1e-2
        log: true

  - name: "lasso"
    type: "regression"
    default_params:
      alpha: 1.0
      tol: 0.001
      random_state: 42
      max_iter: 10000
    param_space:
      alpha:
        type: "float"
        low: 0.01
        high: 100.0
        log: true
      tol:
        type: "float"
        low: 1e-6
        high: 1e-2
        log: true

  - name: "ols"
    type: "regression"
    default_params: {}
    param_space: {}

  - name: "elasticnet"
    type: "regression"
    default_params:
      alpha: 1.0
      l1_ratio: 0.5
      random_state: 42
      max_iter: 10000
    param_space:
      alpha:
        type: "float"
        low: 0.0001
        high: 10.0
        log: true
      l1_ratio:
        type: "float"
        low: 0.0
        high: 1.0

  - name: "decision_tree"
    type: "regression"
    default_params:
      max_depth: null
      min_samples_split: 2
      random_state: 42
    param_space:
      max_depth:
        type: "categorical"
        choices: ["None", 5, 10, 20, 30]
      min_samples_split:
        type: "int"
        low: 2
        high: 20

  - name: "random_forest"
    type: "regression"
    default_params:
      n_estimators: 100
      max_depth: null
      min_samples_split: 2
      max_features: "sqrt"
      random_state: 42
      n_jobs: -1
    param_space:
      n_estimators:
        type: "int"
        low: 50
        high: 1000
      max_depth:
        type: "categorical"
        choices: ["None", 5, 10, 20, 30]
      min_samples_split:
        type: "int"
        low: 2
        high: 20
      max_features:
        type: "categorical"
        choices: ["sqrt", "log2"]

  - name: "gradient_boosting"
    type: "regression"
    default_params:
      learning_rate: 0.1
      n_estimators: 100
      max_depth: 3
      subsample: 1.0
      random_state: 42
    param_space:
      learning_rate:
        type: "float"
        low: 0.001
        high: 0.5
        log: true
      n_estimators:
        type: "int"
        low: 100
        high: 1000
      max_depth:
        type: "int"
        low: 3
        high: 10
      subsample:
        type: "float"
        low: 0.5
        high: 1.0

  - name: "svr"
    type: "regression"
    default_params:
      C: 1.0
      epsilon: 0.1
      kernel: "rbf"
    param_space:
      C:
        type: "float"
        low: 0.01
        high: 1000.0
        log: true
      epsilon:
        type: "float"
        low: 0.001
        high: 1.0
        log: true
      kernel:
        type: "categorical"
        choices: ["rbf", "linear", "poly"]

  # --- M4: Classification ------------------------------------------------

  - name: "logistic_regression"
    type: "classification"
    default_params:
      C: 1.0
      penalty: "l2"
      solver: "lbfgs"
      max_iter: 5000
      random_state: 42
    param_space:
      C:
        type: "float"
        low: 0.01
        high: 100.0
        log: true
      penalty:
        type: "categorical"
        choices: ["l2", "l1"]
      solver:
        type: "categorical"
        choices: ["lbfgs", "saga", "liblinear"]

  - name: "knn"
    type: "classification"
    default_params:
      n_neighbors: 5
      weights: "uniform"
      p: 2
    param_space:
      n_neighbors:
        type: "int"
        low: 1
        high: 30
      weights:
        type: "categorical"
        choices: ["uniform", "distance"]
      p:
        type: "categorical"
        choices: [1, 2]

  - name: "svc"
    type: "classification"
    default_params:
      C: 1.0
      kernel: "rbf"
      gamma: "scale"
      probability: true
      random_state: 42
    param_space:
      C:
        type: "float"
        low: 0.01
        high: 1000.0
        log: true
      kernel:
        type: "categorical"
        choices: ["rbf", "linear", "poly"]
      gamma:
        type: "categorical"
        choices: ["scale", "auto"]

  - name: "decision_tree_classifier"
    type: "classification"
    default_params:
      max_depth: null
      min_samples_split: 2
      criterion: "gini"
      random_state: 42
    param_space:
      max_depth:
        type: "categorical"
        choices: ["None", 5, 10, 20, 30]
      min_samples_split:
        type: "int"
        low: 2
        high: 20
      criterion:
        type: "categorical"
        choices: ["gini", "entropy"]

  - name: "kmeans"
    type: "clustering"
    default_params:
      n_clusters: 3
      init: "k-means++"
      n_init: 10
      random_state: 42
      algorithm: "lloyd"
    param_space:
      n_clusters:
        type: "int"
        low: 2
        high: 10
      init:
        type: "categorical"
        choices: ["k-means++", "random"]
      algorithm:
        type: "categorical"
        choices: ["lloyd", "elkan"]

  - name: "dbscan"
    type: "clustering"
    default_params:
      eps: 0.5
      min_samples: 5
    param_space:
      eps:
        type: "float"
        low: 0.1
        high: 5.0
        log: true
      min_samples:
        type: "int"
        low: 2
        high: 20

  - name: "gmm"
    type: "clustering"
    default_params:
      n_components: 3
      covariance_type: "full"
      n_init: 3
      random_state: 42
    param_space:
      n_components:
        type: "int"
        low: 2
        high: 10
      covariance_type:
        type: "categorical"
        choices: ["full", "tied", "diag", "spherical"]

  # --- M2: Clustering maturity ------------------------------------------

  - name: "hdbscan"
    type: "clustering"
    default_params:
      min_cluster_size: 5
      min_samples: null
      cluster_selection_method: "eom"
    param_space:
      min_cluster_size:
        type: "int"
        low: 2
        high: 20
      min_samples:
        type: "categorical"
        choices: ["None", 5, 10]
      cluster_selection_method:
        type: "categorical"
        choices: ["eom", "leaf"]

  - name: "agglomerative"
    type: "clustering"
    default_params:
      n_clusters: 3
      linkage: "ward"
    param_space:
      n_clusters:
        type: "int"
        low: 2
        high: 10
      linkage:
        type: "categorical"
        choices: ["ward", "complete", "average", "single"]

  - name: "spectral"
    type: "clustering"
    default_params:
      n_clusters: 3
      affinity: "rbf"
      random_state: 42
      n_init: 10
    param_space:
      n_clusters:
        type: "int"
        low: 2
        high: 10
      affinity:
        type: "categorical"
        choices: ["rbf", "nearest_neighbors"]

  - name: "birch"
    type: "clustering"
    default_params:
      n_clusters: 3
      threshold: 0.5
    param_space:
      n_clusters:
        type: "int"
        low: 2
        high: 10
      threshold:
        type: "float"
        low: 0.1
        high: 1.0

  - name: "optics"
    type: "clustering"
    default_params:
      min_samples: 5
      xi: 0.05
    param_space:
      min_samples:
        type: "int"
        low: 2
        high: 20
      xi:
        type: "float"
        low: 0.01
        high: 0.5

  - name: "pca"
    type: "reducer"
    default_params:
      n_components: 2
      random_state: 42
    param_space:
      n_components:
        type: "int"
        low: 2
        high: 15

  - name: "umap"
    type: "reducer"
    default_params:
      n_neighbors: 15
      min_dist: 0.1
      n_components: 2
      random_state: 42
    param_space:
      n_neighbors:
        type: "int"
        low: 5
        high: 50
      min_dist:
        type: "float"
        low: 0.0
        high: 1.0
      n_components:
        type: "int"
        low: 2
        high: 10

  # --- M3: Dimensionality reduction -------------------------------------

  - name: "tsne"
    type: "reducer"
    default_params:
      n_components: 2
      perplexity: 30
      learning_rate: "auto"
      init: "pca"
      method: "barnes_hut"
      random_state: 42
    param_space:
      n_components:
        type: "categorical"
        choices: [2, 3]
      perplexity:
        type: "float"
        low: 5
        high: 30
      learning_rate:
        type: "categorical"
        choices: ["auto", 200, 500]

  - name: "truncated_svd"
    type: "reducer"
    default_params:
      n_components: 2
      random_state: 42
    param_space:
      n_components:
        type: "int"
        low: 2
        high: 15

  - name: "factor_analysis"
    type: "reducer"
    default_params:
      n_components: 2
      random_state: 0
      max_iter: 1000
    param_space:
      n_components:
        type: "int"
        low: 2
        high: 15

  - name: "standard_scaler"
    type: "scaler"
    default_params: {}
    param_space: {}

  - name: "minmax_scaler"
    type: "scaler"
    default_params: {}
    param_space: {}