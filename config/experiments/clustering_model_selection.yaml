name: clustering_model_selection
task: clustering
dataset: iris
model: kmeans          # fallback / default
models:                # M2 — search across clustering families
  - kmeans
  - agglomerative
  - spectral
  - birch
scaler: standard_scaler
reducer: pca
random_state: 42

cv:
  strategy: kfold
  n_splits: 3
  random_state: 42

optimization:
  enabled: true
  n_trials: 60
  direction: maximize
  study_name: clustering_model_selection
  storage: sqlite:///clustering_optuna.db
  load_if_exists: true
  sampler: tpe
  pruner: null
