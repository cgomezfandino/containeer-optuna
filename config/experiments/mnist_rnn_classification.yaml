name: mnist_rnn_classification
task: classification
dataset: mnist              # M7 — torchvision source (treated as sequences)
model: rnn_classifier       # M7 — PyTorch LSTM/GRU
metric: accuracy
scaler: null
reducer: null
random_state: 42

cv:
  strategy: stratified_kfold
  n_splits: 3
  random_state: 42

optimization:
  enabled: true
  n_trials: 30
  direction: maximize
  study_name: mnist_rnn_classification
  storage: sqlite:///optuna_studies.db
  load_if_exists: true
  sampler: tpe
  pruner: median            # M7 — epoch pruning
