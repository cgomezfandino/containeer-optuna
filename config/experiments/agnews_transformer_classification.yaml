name: agnews_transformer_classification
task: classification
dataset: ag_news            # M8 — HuggingFace source
model: transformer_classifier  # M8 — DistilBERT/BERT fine-tuning
metric: accuracy
scaler: null                # NLP objective tokenizes raw text directly
reducer: null
random_state: 42

cv:
  strategy: stratified_kfold
  n_splits: 3
  random_state: 42

optimization:
  enabled: true
  n_trials: 20
  direction: maximize
  study_name: agnews_transformer_classification
  storage: sqlite:///optuna_studies.db
  load_if_exists: true
  sampler: tpe
  pruner: median            # M8 — epoch pruning
