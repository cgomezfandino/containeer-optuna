name: breast_cancer_mlp_classification
task: classification
dataset: breast_cancer
model: mlp_classifier       # M6 — PyTorch MLP (requires [dl] extra)
metric: accuracy
scaler: standard_scaler
reducer: null
random_state: 42

cv:
  strategy: stratified_kfold
  n_splits: 3
  random_state: 42

optimization:
  enabled: true
  n_trials: 30
  direction: maximize
  study_name: breast_cancer_mlp_classification
  storage: sqlite:///optuna_studies.db
  load_if_exists: true
  sampler: tpe
  pruner: median            # M6 — epoch pruning
