datasets:
  - name: "auto_mpg"
    path: "./data/auto-mpg.data"
    target_column: "horsepower"
    feature_columns:
      - "weight"
      - "cylinders"
      - "displacement"
      - "acceleration"
      - "model_year"
      - "origin"
    download: false
    preprocessing:
      drop_columns: ["car_name"]
      na_values: ["?"]
      numeric_conversion: ["horsepower"]
      sep: "\\s+"
      header: null
      names:
        - "mpg"
        - "cylinders"
        - "displacement"
        - "horsepower"
        - "weight"
        - "acceleration"
        - "model_year"
        - "origin"
        - "car_name"

  - name: "customer_personality"
    kaggle_dataset: "imakash3011/customer-personality-analysis"
    download: true
    target_column: null
    feature_columns: null
    preprocessing:
      sep: "\\t"
      drop_columns: ["ID", "Dt_Customer"]
      one_hot_encode: ["Education", "Marital_Status"]
      dropna: true

  - name: "credit_card"
    kaggle_dataset: "arjunbhasin2013/ccdata"
    download: true
    target_column: null
    feature_columns: null
    preprocessing:
      drop_columns: ["CUST_ID"]
      dropna: true

  - name: "iris"
    source: "sklearn"
    sklearn_name: "iris"
    target_column: null
    feature_columns: null
    preprocessing: {}

  # M1 — bundled regression dataset (no download; ideal for CI and tutorials).
  # 442 samples, 10 features, continuous target (disease progression).
  - name: "diabetes"
    source: "sklearn"
    sklearn_name: "diabetes"
    target_column: "target"
    feature_columns: null
    preprocessing: {}

  # M4 — bundled classification datasets (no download; ideal for CI/tutorials).
  # breast_cancer: 569 samples, 30 features, binary target (0=malignant, 1=benign).
  - name: "breast_cancer"
    source: "sklearn"
    sklearn_name: "breast_cancer"
    target_column: "target"
    feature_columns: null
    preprocessing: {}

  # wine: 178 samples, 13 features, 3-class target (cultivars).
  - name: "wine"
    source: "sklearn"
    sklearn_name: "wine"
    target_column: "target"
    feature_columns: null
    preprocessing: {}

  # iris_classification: iris configured for supervised classification (3-class).
  - name: "iris_classification"
    source: "sklearn"
    sklearn_name: "iris"
    target_column: "target"
    feature_columns: null
    preprocessing: {}

  # M7 — Image datasets via torchvision (requires [dl] extra).
  # MNIST: 60000 training images, 1 channel, 28x28 pixels, 10 classes.
  - name: "mnist"
    source: "torchvision"
    torchvision_name: "MNIST"
    target_column: null
    feature_columns: null
    preprocessing: {}